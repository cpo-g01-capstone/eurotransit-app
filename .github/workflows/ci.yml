# EuroTransit — Application CI (EM-32)
#
# Build/test the multi-module Kotlin build, then on pushes to main publish
# immutable service images to Azure Container Registry (ACR), authenticating
# via Azure OIDC federation (no registry password). After push, image tags are
# bumped in the config repo for Argo CD to reconcile.
#
# Guarantees (CLAUDE.md "CI rules"):
#   - No cluster credentials. `az acr login` is registry auth only — there is
#     NO kubectl / helm / az aks anywhere in this file. Deployment stays
#     pull-based: this workflow builds/tests, pushes immutable images, and
#     bumps image tags in the config repo for Argo CD to reconcile.
#   - Images are tagged with the 7-char Git SHA (immutable); `latest` only on main.
#   - Least-privilege: top-level token is read-only; jobs widen scope only as needed.
#   - The managed identity (id-eurotransit-ci) needs AcrPush on the ACR; the
#     AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID secrets back it.
#     Provisioned by eurotransit-config/infra/acr-oidc (EM-41).
#
# Owner: @vojtech-n (Delivery). This file lives on the GitOps boundary — review carefully.
name: CI

on:
  # Build/test on PRs to main; build/test + publish to ACR on pushes to main.
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only by default; individual jobs request more (OIDC, attestations).
permissions:
  contents: read

# One run per ref; never cancel mid-run (the GitOps write-back does a git push).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Azure Container Registry login server. Auth is via OIDC federation
  # (azure/login) + `az acr login` — no long-lived registry password.
  REGISTRY: acreurotransitg01.azurecr.io
  # `az acr login --name <ACR_NAME>` takes the bare registry name, not the host.
  ACR_NAME: acreurotransitg01
  # Final image name: acreurotransitg01.azurecr.io/eurotransit/<service>
  IMAGE_PREFIX: eurotransit
  JAVA_VERSION: "21"
  # No Gradle wrapper is committed yet (see EM-13 follow-ups), so CI pins the Gradle
  # version explicitly. Once `gradlew` + gradle/wrapper/ are committed, drop
  # `gradle-version` and call `./gradlew` instead.
  GRADLE_VERSION: "8.9"

jobs:
  # ── 1. Work out which service images need (re)building ───────────────────────
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.matrix.outputs.services }}
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v3
        id: filter
        # paths-filter needs a diff base; on manual dispatch there isn't one, so
        # only run it for push events. Dispatch falls back to building all (below).
        if: github.event_name == 'push'
        with:
          filters: |
            shared:
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '.github/workflows/ci.yml'
            catalog:
              - 'backend/catalog-service/**'
            orders:
              - 'backend/orders-service/**'
            inventory:
              - 'backend/inventory-service/**'
            payments:
              - 'backend/payments-service/**'
            notifications:
              - 'backend/notifications-service/**'
      - id: matrix
        # A manual dispatch (no diff base) rebuilds all services. On push, a
        # shared change (root build, settings, the workflow itself) rebuilds all;
        # otherwise only the services whose directory changed.
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "push" || "${{ steps.filter.outputs.shared }}" == "true" ]]; then
            services='["catalog","orders","inventory","payments","notifications"]'
          else
            services=$(jq -c -n \
              --argjson catalog ${{ steps.filter.outputs.catalog }} \
              --argjson orders ${{ steps.filter.outputs.orders }} \
              --argjson inventory ${{ steps.filter.outputs.inventory }} \
              --argjson payments ${{ steps.filter.outputs.payments }} \
              --argjson notifications ${{ steps.filter.outputs.notifications }} \
              '[ {catalog:$catalog,orders:$orders,inventory:$inventory,payments:$payments,notifications:$notifications}
                 | to_entries[] | select(.value) | .key ]')
          fi
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "Services to image: $services"

  # ── 2. Compile + test the whole multi-module build ───────────────────────────
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # publish the JUnit test report as a check run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          # Only the default branch writes the shared cache; other refs read it.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Build, compile and run unit tests
        run: gradle build --no-daemon --stacktrace
      - name: Publish test report
        # Runs even when tests fail, so results are annotated on the run.
        if: ${{ !cancelled() }}
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          detailed_summary: true
          include_passed: true
          # The gradle step already fails the job on a test failure; this step
          # only surfaces the results (avoid a confusing double failure).
          fail_on_failure: false
      - name: Upload test & build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/**"
          retention-days: 7

  # ── 2b. Static analysis (detekt) — advisory until baselined ──────────────────
  code-checks:
    name: Static analysis (detekt)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true
      - name: Run detekt
        # Advisory: applied via init script, never blocks the pipeline yet.
        # Flip to a hard gate once a detekt config + baseline are committed.
        continue-on-error: true
        run: gradle --init-script config/detekt-init.gradle.kts detekt --continue --no-daemon
      - name: Upload detekt reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: "**/build/reports/detekt/**"
          retention-days: 7
          if-no-files-found: ignore

  # ── 3. Build & push immutable images to ACR (main only) ──────────────────────
  images:
    name: Image (${{ matrix.service }})
    needs: [changes, build-test]
    # Push only for runs on main; PRs/other refs never publish (CLAUDE.md rule).
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: Azure federated login + provenance attestation
      attestations: write # record build provenance
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true
      - name: Build executable jar
        # The service Dockerfile COPYs build/libs/*SNAPSHOT.jar, so the boot jar
        # must exist in the build context before docker build.
        run: gradle :backend:${{ matrix.service }}-service:bootJar --no-daemon
      - uses: docker/setup-buildx-action@v3
      - name: Azure login (OIDC)
        # Federated credential — no long-lived secret. The managed identity
        # backing these values needs the AcrPush role on the ACR.
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to ACR
        # Registry auth only — NOT a cluster credential (no az aks / kubectl).
        run: az acr login --name "${ACR_NAME}"
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ACR supports nested repo paths: <registry>/eurotransit/<service>
          # (must match the chart's `repository: eurotransit/<service>` in config-repo values.yaml).
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend/${{ matrix.service }}-service
          file: ./backend/${{ matrix.service }}-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ── 4. Bump image tags in the config repo → Argo CD reconciles ───────────────
  update-gitops:
    name: Update GitOps (config repo)
    needs: [changes, images]
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read # writes target the OTHER repo via the GitHub App token, not this one
    env:
      CONFIG_REPO: ${{ github.repository_owner }}/eurotransit-config
      VALUES_PATH: deploy/charts/eurotransit/values.yaml
    steps:
      # Cross-repo write-back uses a GitHub App installation token, NOT a personal
      # PAT: org-owned (survives any one person leaving), scoped to eurotransit-config
      # only, and short-lived (~1h, minted per run). Decision: config-repo ADR 0007;
      # setup: eurotransit-config/infra/gitops-writeback-app/README.md.
      # This job only runs on main after images were pushed. A missing write-back
      # App would mean new images sit in ACR but the cluster never gets them — so
      # FAIL here rather than skip. A green run MUST mean the tag was bumped.
      - name: Require the GitOps write-back App
        env:
          APP_ID: ${{ secrets.CONFIG_REPO_APP_ID }}
          APP_KEY: ${{ secrets.CONFIG_REPO_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "$APP_ID" || -z "$APP_KEY" ]]; then
            echo "::error::CONFIG_REPO_APP_ID / CONFIG_REPO_APP_PRIVATE_KEY not set — \
            cannot write image tags to $CONFIG_REPO. Install the GitOps write-back GitHub \
            App (Contents: write) and add its App ID + private key as Actions secrets. See \
            eurotransit-config/infra/gitops-writeback-app/README.md."
            exit 1
          fi
      - name: Mint a short-lived config-repo token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CONFIG_REPO_APP_ID }}
          private-key: ${{ secrets.CONFIG_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: eurotransit-config
      - name: Resolve the App's bot user id (for commit attribution)
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: config
      - name: Bump image tags
        run: |
          set -euo pipefail
          VALUES="config/${VALUES_PATH}"
          if [[ ! -f "$VALUES" ]]; then
            echo "::error::$VALUES_PATH not found in $CONFIG_REPO — the chart moved, or the path/checkout is wrong. Refusing to no-op."
            exit 1
          fi
          for svc in $(echo '${{ needs.changes.outputs.services }}' | jq -r '.[]'); do
            echo "Setting .${svc}.image.tag = ${{ needs.changes.outputs.short_sha }}"
            yq -i ".${svc}.image.tag = \"${{ needs.changes.outputs.short_sha }}\"" "$VALUES"
          done
      - name: Commit and push
        working-directory: config
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          BOT_UID: ${{ steps.bot.outputs.user-id }}
        run: |
          set -euo pipefail
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${BOT_UID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No image-tag changes to commit."
            exit 0
          fi
          git commit -m "ci(eurotransit-app): bump image tags to ${{ needs.changes.outputs.short_sha }}"
          git push
