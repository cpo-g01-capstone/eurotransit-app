server:
  port: 8081
  shutdown: graceful
spring:
  lifecycle:
    timeout-per-shutdown-phase: 50s
  application:
    name: catalog-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      # groupId is set PER-INSTANCE in the listener annotation (cache-building
      # consumers are broadcast consumers — see InventoryReservedListener).
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.eurotransit.*
    listener:
      # Trace-context propagation (ADR 0022): browse-cache updates join the order's trace.
      observation-enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  # --- Distributed tracing (money path: "where did this order spend its time?") ---
  tracing:
    sampling:
      # 100%: traffic is tiny and chaos-experiment analysis needs every trace.
      # Revisit only if volume ever makes trace storage a cost concern (ADR 0022).
      probability: 1.0
  otlp:
    tracing:
      # Tempo's OTLP/HTTP receiver in the monitoring namespace. The matching
      # NetworkPolicy egress rule ships in the config repo (default-deny would
      # silently drop spans otherwise). Local dev: override via env.
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://tempo.monitoring.svc.cluster.local:4318/v1/traces}
