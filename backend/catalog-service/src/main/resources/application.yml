server:
  port: 8081
  shutdown: graceful
spring:
  lifecycle:
    timeout-per-shutdown-phase: 50s
  application:
    name: catalog-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      # groupId is set PER-INSTANCE in the listener annotation (cache-building
      # consumers are broadcast consumers — see InventoryReservedListener).
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.eurotransit.*
        # Cross-service contract: IGNORE producer type headers. Each producer
        # writes its OWN event class name into the header; consumers in other
        # services don't have that class -> ClassNotFound -> every event either
        # crashed the loop (naked JsonDeserializer) or was silently dropped as
        # poison (ErrorHandlingDeserializer). Each @KafkaListener declares its
        # expected type via spring.json.value.default.type instead.
        # (Same setUseTypeHeaders(false) notifications' KafkaConfig always had.)
        spring.json.use.type.headers: false
        # Target type at the YML level, NOT only in @KafkaListener(properties):
        # in production the listener-level property never reached the delegate
        # JsonDeserializer (value came out null and the cache froze at the seed
        # values), while this consumer-config path is proven by
        # InventoryReservedDeserializationTest against bytes captured from the
        # topic. Catalog has exactly one listener, so a global default is safe.
        spring.json.value.default.type: com.eurotransit.catalog.event.InventoryReservedEvent
    listener:
      # Trace-context propagation (ADR 0022): browse-cache updates join the order's trace.
      observation-enabled: true
# Startup-only snapshot hydration of the advisory cache (issue #31) — NOT a
# read-path dependency; browse still serves purely from memory (CE-1).
# In-cluster default = the Inventory ClusterIP service (same convention as
# orders' payments.base-url); override via INVENTORY_BASE_URL for local dev
# (e.g. http://localhost:8083).
inventory:
  base-url: ${INVENTORY_BASE_URL:http://eurotransit-inventory}
management:
  metrics:
    distribution:
      # Publish histogram BUCKETS for HTTP server latency: without them
      # http_server_requests_seconds is a plain summary (count/sum/max) and
      # every histogram_quantile() in the dashboards AND the
      # CheckoutHighP95Latency alert silently return no data — found during
      # the live canary promotion gate, when the runbook's p95 query came back empty on
      # the first real traffic (agent-log case 20).
      percentiles-histogram:
        http.server.requests: true
      # Bucket boundaries aligned with what we actually alert/gate on:
      # the ratified 300ms canary promotion gate and the 500ms p95 SLO
      # (config repo: ADR 0026 and docs/design/slo-definitions.md).
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 300ms, 500ms, 1s, 2s
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  # --- Distributed tracing (money path: "where did this order spend its time?") ---
  tracing:
    sampling:
      # 100%: traffic is tiny and chaos-experiment analysis needs every trace.
      # Revisit only if volume ever makes trace storage a cost concern (ADR 0022).
      probability: 1.0
  otlp:
    tracing:
      # Tempo's OTLP/HTTP receiver in the monitoring namespace. The matching
      # NetworkPolicy egress rule ships in the config repo (default-deny would
      # silently drop spans otherwise). Local dev: override via env.
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://tempo.monitoring.svc.cluster.local:4318/v1/traces}
