server:
  port: 8083
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 50s
  application:
    name: inventory-service
  r2dbc:
    url: ${INVENTORY_DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/inventorydb}
    username: ${INVENTORY_DB_USERNAME:app}
    password: ${INVENTORY_DB_PASSWORD:app}
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway uses JDBC (R2DBC is runtime-only). In Kubernetes, mount secret
    # eurotransit-inventory-db-app and set INVENTORY_DB_JDBC_URL from key jdbc-uri.
    url: ${INVENTORY_DB_JDBC_URL:jdbc:postgresql://localhost:5432/inventorydb}
    user: ${INVENTORY_DB_USERNAME:app}
    password: ${INVENTORY_DB_PASSWORD:app}
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer: a poison message must not kill the consumer loop.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.eurotransit.*
        # Cross-service contract: IGNORE producer type headers. Each producer
        # writes its OWN event class name into the header; consumers in other
        # services don't have that class -> ClassNotFound -> every event either
        # crashed the loop (naked JsonDeserializer) or was silently dropped as
        # poison (ErrorHandlingDeserializer). Each @KafkaListener declares its
        # expected type via spring.json.value.default.type instead.
        # (Same setUseTypeHeaders(false) notifications' KafkaConfig always had.)
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Don't leak OUR class names into headers other services can't load —
        # see the consumer-side note above (agent-log case 18).
        spring.json.add.type.headers: false
    listener:
      ack-mode: manual
      # Propagate W3C trace context through Kafka: consumer spans join the
      # producer's trace, so one trace follows the order across services.
      observation-enabled: true
    template:
      observation-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  # --- Distributed tracing (money path: "where did this order spend its time?") ---
  tracing:
    sampling:
      # 100%: traffic is tiny and chaos-experiment analysis needs every trace.
      # Revisit only if volume ever makes trace storage a cost concern (ADR 0022).
      probability: 1.0
  otlp:
    tracing:
      # Tempo's OTLP/HTTP receiver in the monitoring namespace. The matching
      # NetworkPolicy egress rule ships in the config repo (default-deny would
      # silently drop spans otherwise). Local dev: override via env.
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://tempo.monitoring.svc.cluster.local:4318/v1/traces}
