server:
  port: 8085
  shutdown: graceful
spring:
  lifecycle:
    # Aligned with the fleet-wide shutdown chain: preStop(5s) + Spring(50s) < 60s grace.
    # Notifications has no GracefulShutdownManager (best-effort service): Spring drains
    # HTTP natively and unacked Kafka records are simply redelivered after rebalance.
    timeout-per-shutdown-phase: 50s
  application:
    name: notifications-service
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      # Bounded so a slow/hung SMTP exercises the retry -> DLT path instead of
      # holding the consumer thread indefinitely (resilience, not a stub).
      mail.smtp.connectiontimeout: 3000
      mail.smtp.timeout: 3000
      mail.smtp.writetimeout: 3000
      mail.smtp.auth: ${SPRING_MAIL_AUTH:true}
      mail.smtp.starttls.enable: ${SPRING_MAIL_STARTTLS:true}
  r2dbc:
    url: ${NOTIFICATIONS_DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/notificationsdb}
    username: ${NOTIFICATIONS_DB_USERNAME:app}
    password: ${NOTIFICATIONS_DB_PASSWORD:app}
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway runs on JDBC (R2DBC is runtime-only). In Kubernetes set NOTIFICATIONS_DB_JDBC_URL
    # from the operator secret eurotransit-notifications-db-app (key jdbc-uri).
    url: ${NOTIFICATIONS_DB_JDBC_URL:jdbc:postgresql://localhost:5432/notificationsdb}
    user: ${NOTIFICATIONS_DB_USERNAME:app}
    password: ${NOTIFICATIONS_DB_PASSWORD:app}
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:eurotransit-kafka-kafka-bootstrap.eurotransit:9092}
    consumer:
      group-id: notifications
      auto-offset-reset: earliest
    # Trace-context propagation. NOTE: notifications builds a CUSTOM listener
    # container factory (KafkaConfig) — observation is also enabled there in code;
    # these properties cover the auto-configured template (DLT publishing).
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
notifications:
  email:
    # `logging` (default) = stub sender; `smtp` = real send via spring.mail.*.
    # The cluster sets NOTIFICATIONS_EMAIL_SENDER=smtp (config repo).
    sender: ${NOTIFICATIONS_EMAIL_SENDER:logging}
    from: ${NOTIFICATIONS_EMAIL_FROM:noreply@eurotransit.test}
management:
  metrics:
    distribution:
      # Publish histogram BUCKETS for HTTP server latency: without them
      # http_server_requests_seconds is a plain summary (count/sum/max) and
      # every histogram_quantile() in the dashboards AND the
      # CheckoutHighP95Latency alert silently return no data — found during
      # the live canary promotion gate, when the runbook's p95 query came back empty on
      # the first real traffic (agent-log case 20).
      percentiles-histogram:
        http.server.requests: true
      # Bucket boundaries aligned with what we actually alert/gate on:
      # the ratified 300ms canary promotion gate and the 500ms p95 SLO
      # (config repo: ADR 0026 and docs/design/slo-definitions.md).
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 300ms, 500ms, 1s, 2s
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  # --- Distributed tracing (money path: "where did this order spend its time?") ---
  tracing:
    sampling:
      # 100%: traffic is tiny and chaos-experiment analysis needs every trace.
      # Revisit only if volume ever makes trace storage a cost concern (ADR 0022).
      probability: 1.0
  otlp:
    tracing:
      # Tempo's OTLP/HTTP receiver in the monitoring namespace. The matching
      # NetworkPolicy egress rule ships in the config repo (default-deny would
      # silently drop spans otherwise). Local dev: override via env.
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://tempo.monitoring.svc.cluster.local:4318/v1/traces}
