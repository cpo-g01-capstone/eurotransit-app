server:
  port: 8082
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: orders-service
  r2dbc:
    url: ${ORDERS_DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/ordersdb}
    username: ${ORDERS_DB_USERNAME:app}
    password: ${ORDERS_DB_PASSWORD:app}
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway uses JDBC (R2DBC is runtime-only). In Kubernetes, mount secret
    # eurotransit-orders-db-app and set ORDERS_DB_JDBC_URL from key jdbc-uri.
    url: ${ORDERS_DB_JDBC_URL:jdbc:postgresql://localhost:5432/ordersdb}
    user: ${ORDERS_DB_USERNAME:app}
    password: ${ORDERS_DB_PASSWORD:app}
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, shutdown
  endpoint:
    shutdown:
      enabled: true
    health:
      probes:
        enabled: true
