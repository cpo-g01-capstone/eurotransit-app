server:
  port: 8082
  shutdown: graceful

spring:
  lifecycle:
    # Must exceed the GracefulShutdownManager drain budget (45s + 5s margin).
    # Chain invariant (helm values / ADR 0002): preStop(5s) + Spring(50s) < terminationGracePeriod(60s).
    timeout-per-shutdown-phase: 50s
  application:
    name: orders-service
  r2dbc:
    url: ${ORDERS_DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/ordersdb}
    username: ${ORDERS_DB_USERNAME:app}
    password: ${ORDERS_DB_PASSWORD:app}
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway uses JDBC (R2DBC is runtime-only). In Kubernetes, mount secret
    # eurotransit-orders-db-app and set ORDERS_DB_JDBC_URL from key jdbc-uri.
    url: ${ORDERS_DB_JDBC_URL:jdbc:postgresql://localhost:5432/ordersdb}
    user: ${ORDERS_DB_USERNAME:app}
    password: ${ORDERS_DB_PASSWORD:app}
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: orders-service
      auto-offset-reset: earliest
      # Manual ack is REQUIRED by the graceful-shutdown design: during drain the
      # consumer early-returns WITHOUT ack so the message is redelivered elsewhere.
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer: a poison message must not kill the consumer loop.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.eurotransit.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual
      # Propagate W3C trace context through Kafka: consumer spans join the
      # producer's trace, so one trace follows the order across services.
      observation-enabled: true
    template:
      observation-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  # --- Distributed tracing (money path: "where did this order spend its time?") ---
  tracing:
    sampling:
      # 100%: traffic is tiny and chaos-experiment analysis needs every trace.
      # Revisit only if volume ever makes trace storage a cost concern (ADR 0020).
      probability: 1.0
  otlp:
    tracing:
      # Tempo's OTLP/HTTP receiver in the monitoring namespace. The matching
      # NetworkPolicy egress rule ships in the config repo (default-deny would
      # silently drop spans otherwise). Local dev: override via env.
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://tempo.monitoring.svc.cluster.local:4318/v1/traces}

# In-cluster default = the Payments ClusterIP service (port 80). Override with
# PAYMENTS_BASE_URL for local dev (e.g. http://localhost:8084).
payments:
  base-url: ${PAYMENTS_BASE_URL:http://eurotransit-payments}

# ADR 0018 resilience policy for the synchronous Orders -> Payments authorize call.
# Values are team-proposed defaults, to tune after the k6 baseline (see the ADR).
resilience4j:
  circuitbreaker:
    instances:
      payments:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        # open on clear breakage OR on "slow death" (calls succeed but hold threads)
        failureRateThreshold: 50
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      payments:
        maxAttempts: 3
        waitDuration: 250ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        # jitter: avoid synchronized retry waves (thundering herd)
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        ignoreExceptions:
          # never hammer an OPEN breaker: fail fast to the Kafka error handler
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  ratelimiter:
    instances:
      checkout:
        # Backpressure / load shedding on the entry endpoint: beyond this rate the
        # API answers 429 immediately (timeout 0 = refuse, don't queue). 429 is a
        # CONTROLLED refusal — excluded from the SLO error budget by design
        # (docs/design/slo-definitions.md).
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 0
