server:
  port: 8084

spring:
  application:
    name: payments-service
  r2dbc:
    url: ${PAYMENTS_DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/paymentsdb}
    username: ${PAYMENTS_DB_USERNAME:app}
    password: ${PAYMENTS_DB_PASSWORD:app}
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway uses JDBC (R2DBC is runtime-only). In Kubernetes, mount secret
    # eurotransit-payments-db-app and set PAYMENTS_DB_JDBC_URL from key jdbc-uri.
    url: ${PAYMENTS_DB_JDBC_URL:jdbc:postgresql://localhost:5432/paymentsdb}
    user: ${PAYMENTS_DB_USERNAME:app}
    password: ${PAYMENTS_DB_PASSWORD:app}
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: payments-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.eurotransit.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      probes:
        enabled: true
