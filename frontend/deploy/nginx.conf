# EuroTransit frontend — production web server config.
#
# Serves the static Vite build and enforces the security headers required by
# the 07b-Frontend Security checklist. The backend (07b: "the server sets the
# CSP header, the frontend must not rely on inline scripts") is this nginx.
#
# Deployment model: this container sits behind the same Traefik IngressRoute
# host (eurotransit.vojtechn.dev) that routes /api/* to the services, so the
# SPA and the API are same-origin — no CORS configuration needed anywhere.
# Traefik already 301s HTTP→HTTPS and terminates TLS (cert-manager/LE).

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (07b) -------------------------------------------
    # CSP: no unsafe-inline in script-src; everything self-hosted.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    # HSTS: only meaningful when served over HTTPS (Traefik terminates TLS).
    # Browsers ignore it on plain HTTP, so it is safe to set unconditionally.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Static assets -----------------------------------------------------
    # Hashed asset filenames → cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: every non-file path renders index.html (React Router).
    # /api never reaches this server — Traefik routes it to the backend first.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
